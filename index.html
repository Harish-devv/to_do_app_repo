<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>To Do App</title>
</head>
<body>
    <div class="container">
        <h2 class="header">Get it Done.</h2>

        <div class="input-box">
            <input id="input" class="input" type="text" placeholder="Enter a task">
            <span class="inputs-1st-row">
                <button id="addBtn" class="buttons">Add</button>
                <button id="clearAllBtn" class="buttons">Clear All</button>
                <button id="selectAll" class="buttons">Select All</button>
            </span>

            <br>
                <p style="display: inline;">Set due for the task:</p>
                <input type="date" id="dueDate" class="due">
                <input type="time" id="dueTime" class="due">
        </div>

        <br>

        <div class="filters-counters">
            <div class=filters>
                <p style="display: inline;">Filters:</p>
                <button onclick="setFilter('all')" class="buttons">All</button>
                <button onclick="setFilter('completed')" class="buttons">Completed</button>
                <button onclick="setFilter('pending')" class="buttons">Pending</button>
            </div>

            <br>

            <div class="counter">
                <p style="display: inline;">Total:</p> <span id="total">0</span> |
                <p style="display: inline;">Completed:</p> <span id="completed">0</span> |
                <p style="display: inline;">Remaining:</p> <span id="remaining">0</span> 
            </div>
        </div>
        <br>
        <ul id="list" class="list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
