<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To Do App</title>
</head>
<body>
    <div class="container">
        <h2 class="header">To-Do List</h2>

        <br>

        <div class="input-box">
            <input id="input" type="text" placeholder="Enter a task">
            <button id="addBtn">Add</button>
            <button id="clearAllBtn">Clear All</button>
            <button id="selectAll">Mark all as completed</button>
            <input type="date" id="dueDate">
            <input type="time" id="dueTime">
        </div>

        <br>

        <div class=filters>
            Filters:
            <button onclick="setFilter('all')">All</button>
            <button onclick="setFilter('completed')">Completed</button>
            <button onclick="setFilter('pending')">Pending</button>
        </div>

        <br>

        <div class="counter">
            Total: <span id="total">0</span> |
            Completed: <span id="completed">0</span> |
            Remaining: <span id="remaining">0</span> 
        </div>
        <br>
        <div class="list">
            <ul id="list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
